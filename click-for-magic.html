<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click for Magic</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4af37;
      --gold-soft: #f6d77a;
      --black-rich: #120c10;
      --black-deep: #1a1117;
      --champagne: #f1e3c6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Cinzel Decorative", "Times New Roman", serif;
      color: var(--champagne);
      background:
        radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.15), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(255, 244, 224, 0.08), transparent 60%),
        linear-gradient(135deg, rgba(10, 8, 12, 0.95), rgba(26, 18, 24, 0.92));
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .magic-card {
      width: min(720px, 90vw);
      padding: 48px 40px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(18, 12, 16, 0.98), rgba(26, 17, 23, 0.94));
      border: 2px solid rgba(212, 175, 55, 0.7);
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.25);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .magic-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.15), transparent 55%);
      opacity: 0.8;
      animation: glowMove 8s ease-in-out infinite;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      color: transparent;
      background: linear-gradient(135deg, var(--black-rich), var(--gold) 55%, var(--gold-soft));
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
      position: relative;
      z-index: 1;
    }

    p {
      margin: 0 auto 28px;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      line-height: 1.8;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .magic-button {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 999px;
      border: 1px solid rgba(212, 175, 55, 0.7);
      color: var(--gold-soft);
      background: linear-gradient(135deg, var(--black-deep), var(--black-rich));
      box-shadow: 0 12px 26px rgba(212, 175, 55, 0.35);
      font-size: 1.05rem;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      z-index: 1;
    }

    .magic-button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 16px 32px rgba(212, 175, 55, 0.5);
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--gold-soft);
      border-radius: 50%;
      opacity: 0.7;
      animation: floatUp 4s linear infinite;
      pointer-events: none;
    }

    @keyframes glowMove {
      0%, 100% { transform: translate(-10%, -6%); }
      50% { transform: translate(10%, 8%); }
    }

    @keyframes floatUp {
      0% { transform: translateY(40px) scale(0.6); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translateY(-220px) scale(1.1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="magic-card">
    <h1>💖 Click for Magic 💖</h1>
    <p>Tap the button and make a wish. The universe is listening, and tonight is filled with golden sparkle.</p>
    <button class="magic-button" onclick="spawnSparkles()">Reveal the Magic</button>
  </div>

  <script>
    function spawnSparkles() {
      for (let i = 0; i < 24; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.bottom = '-10px';
        s.style.animationDelay = (Math.random() * 1.5) + 's';
        s.style.opacity = (Math.random() * 0.6 + 0.2).toFixed(2);
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4500);
      }
    }
  </script>
</body>
</html>
