<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Golden birthday glow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1746"/>
      <stop offset="100%" stop-color="#ff9a6c"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffe9ae" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe9ae" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="600" cy="360" r="320" fill="url(#halo)"/>
  <g fill="#fff3dd" opacity="0.75">
    <circle cx="240" cy="170" r="8"/>
    <circle cx="320" cy="220" r="5"/>
    <circle cx="900" cy="160" r="7"/>
    <circle cx="980" cy="240" r="5"/>
    <circle cx="540" cy="120" r="6"/>
  </g>
  <text x="600" y="490" fill="#fff8ee" font-size="82" font-family="Georgia, serif" text-anchor="middle">Cynthia</text>
  <text x="600" y="560" fill="#ffe7c0" font-size="42" font-family="Verdana, sans-serif" text-anchor="middle">Golden Birthday Mood</text>
</svg>
